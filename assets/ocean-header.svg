<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="200" preserveAspectRatio="none">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="wave1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#023E8A" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="wave3Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0077B6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#023E8A" stop-opacity="1"/>
    </linearGradient>
    <style>
      @keyframes wave1 {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-600px); }
      }
      @keyframes wave2 {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-800px); }
      }
      @keyframes wave3 {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-500px); }
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-6px); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.9; }
        50%       { opacity: 0.2; }
      }
      @keyframes twinkle2 {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 1; }
      }
      .wave1 { animation: wave1 8s linear infinite; }
      .wave2 { animation: wave2 12s linear infinite; }
      .wave3 { animation: wave3 6s linear infinite; }
      .boat  { animation: bob 3s ease-in-out infinite; }
      .star1 { animation: twinkle 2.5s ease-in-out infinite; }
      .star2 { animation: twinkle2 3.5s ease-in-out infinite; }
      .star3 { animation: twinkle 4s ease-in-out infinite; }
      .star4 { animation: twinkle2 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="200" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle class="star1" cx="80"  cy="20" r="1.2" fill="white"/>
  <circle class="star2" cx="210" cy="35" r="1"   fill="white"/>
  <circle class="star3" cx="350" cy="15" r="1.4" fill="white"/>
  <circle class="star4" cx="490" cy="28" r="0.9" fill="white"/>
  <circle class="star1" cx="620" cy="18" r="1.1" fill="white"/>
  <circle class="star2" cx="750" cy="32" r="1.3" fill="white"/>
  <circle class="star3" cx="880" cy="12" r="1"   fill="white"/>
  <circle class="star4" cx="970" cy="25" r="1.2" fill="white"/>
  <circle class="star1" cx="1080" cy="20" r="0.8" fill="white"/>
  <circle class="star2" cx="150" cy="50" r="0.9" fill="white"/>
  <circle class="star3" cx="440" cy="45" r="1.1" fill="white"/>
  <circle class="star4" cx="700" cy="48" r="1"   fill="white"/>
  <circle class="star1" cx="920" cy="42" r="1.3" fill="white"/>
  <circle class="star2" cx="1140" cy="38" r="0.9" fill="white"/>

  <!-- Crescent moon -->
  <circle cx="1100" cy="35" r="16" fill="#1a2040"/>
  <circle cx="1108" cy="29" r="13" fill="#0a0e27"/>
  <!-- Moon glow using overlapping circles -->
  <circle cx="1093" cy="38" r="14" fill="#e8e0c8" opacity="0.92"/>
  <circle cx="1101" cy="32" r="11" fill="#0a0e27"/>

  <!-- Wave layer 3 (back, darkest) -->
  <g class="wave3">
    <path d="M0 145 Q75 130 150 145 Q225 160 300 145 Q375 130 450 145 Q525 160 600 145 Q675 130 750 145 Q825 160 900 145 Q975 130 1050 145 Q1125 160 1200 145 Q1275 130 1350 145 Q1425 160 1500 145 L1500 200 L0 200 Z" fill="url(#wave3Grad)"/>
  </g>

  <!-- Wave layer 2 (middle) -->
  <g class="wave2">
    <path d="M0 155 Q100 138 200 155 Q300 172 400 155 Q500 138 600 155 Q700 172 800 155 Q900 138 1000 155 Q1100 172 1200 155 Q1300 138 1400 155 Q1500 172 1600 155 L1600 200 L0 200 Z" fill="url(#wave2Grad)"/>
  </g>

  <!-- Wave layer 1 (front, brightest) -->
  <g class="wave1">
    <path d="M0 162 Q150 148 300 162 Q450 176 600 162 Q750 148 900 162 Q1050 176 1200 162 Q1350 148 1500 162 Q1650 176 1800 162 L1800 200 L0 200 Z" fill="url(#wave1Grad)"/>
  </g>

  <!-- Sailboat (bobbing on the top wave) -->
  <g class="boat" transform="translate(580, 118)">
    <!-- Hull -->
    <path d="M-28 22 Q0 30 28 22 L22 38 L-22 38 Z" fill="#d0d8e8"/>
    <!-- Mast -->
    <rect x="-1.5" y="-30" width="3" height="54" fill="#c8d0e0"/>
    <!-- Main sail -->
    <path d="M0 -28 L28 18 L0 18 Z" fill="white" opacity="0.92"/>
    <!-- Fore sail -->
    <path d="M0 -20 L-20 16 L0 16 Z" fill="white" opacity="0.8"/>
    <!-- Flag -->
    <polygon points="0,-30 10,-24 0,-18" fill="#00BFFF"/>
  </g>
</svg>
